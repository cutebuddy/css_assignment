<!DOCTYPE html>
<html>
<head>
<title>Facebook Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f0f2f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
display:flex;
justify-content:space-between;
align-items:center;
width:900px;
}

.left{
width:45%;
}

.left h1{
color:#1877f2;
font-size:60px;
margin-bottom:10px;
}

.left p{
font-size:28px;
}

.right{
width:40%;
}

.login{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.btn1{
width:100%;
padding:12px;
background:#1877f2;
color:white;
border:none;
border-radius:6px;
font-size:20px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin:15px 0;
text-decoration:none;
color:#1877f2;
}

hr{
margin:20px 0;
}

.btn2{
display:block;
margin:auto;
padding:12px 20px;
background:#42b72a;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.page{
text-align:center;
margin-top:20px;
font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<div class="left">
<h1>facebook</h1>
<p>Facebook helps you connect and share with the people in your life.</p>
</div>

<div class="right">
<div class="login">

<input type="text" placeholder="Email address or phone number">

<input type="password" placeholder="Password">

<button class="btn1">Log In</button>

<a href="#">Forgotten password?</a>

<hr>

<button class="btn2">Create New Account</button>

</div>

<p class="page"><b>Create a Page</b> for a celebrity, brand or business.</p>

</div>

</div>

</body>
</html>
